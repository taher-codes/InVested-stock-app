<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InVested | Markets</title>
    <link rel="stylesheet" href="styles.css?v=20260420-bg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header class="site-header">
        <a class="brand" href="index.html">InVested</a>
        <nav class="site-nav">
            <a href="index.html">Dashboard</a>
            <a class="active" href="markets.html">Markets</a>
            <a href="analytics.html">Analytics</a>
            <a href="training.html">Training Mode</a>
        </nav>
    </header>

    <main class="page-shell">
        <section class="hero-panel compact">
            <div>
                <p class="eyebrow">Market breadth</p>
                <h1>Scan sectors, liquidity, and company-level snapshots.</h1>
            </div>
        </section>

        <section class="card-grid markets-grid">
            <article class="content-card">
                <div class="card-heading">
                    <h2>Sector Allocation</h2>
                    <p>Companies grouped by sector in the current dataset</p>
                </div>
                <div class="chart-wrap">
                    <canvas id="sectorChart"></canvas>
                </div>
            </article>

            <article class="content-card">
                <div class="card-heading">
                    <h2>Market Table</h2>
                    <p>Sorted by market capitalization</p>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>Symbol</th>
                            <th>Company</th>
                            <th>Sector</th>
                            <th>Price</th>
                            <th>Change</th>
                            <th>Volume</th>
                        </tr>
                        </thead>
                        <tbody id="stocksTableBody"></tbody>
                    </table>
                </div>
            </article>
        </section>
    </main>

    <script src="shared.js"></script>
    <script src="markets.js"></script>
</body>
</html>
