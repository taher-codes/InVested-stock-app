<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InVested | Analytics</title>
    <link rel="stylesheet" href="styles.css?v=20260420-bg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
</head>
<body>
    <header class="site-header">
        <a class="brand" href="index.html">InVested</a>
        <nav class="site-nav">
            <a href="index.html">Dashboard</a>
            <a href="markets.html">Markets</a>
            <a class="active" href="analytics.html">Analytics</a>
            <a href="training.html">Training Mode</a>
        </nav>
    </header>

    <main class="page-shell">
        <section class="hero-panel compact">
            <div>
                <p class="eyebrow">Interactive analytics</p>
                <h1>Zoom into price, valuation, and trading activity relationships.</h1>
            </div>
        </section>

        <section class="card-grid analytics-grid">
            <article class="content-card">
                <div class="card-heading">
                    <h2>Price vs PE Ratio</h2>
                    <p>Interactive scatter view for comparing valuation and price</p>
                </div>
                <div class="chart-wrap">
                    <canvas id="priceVsPeChart"></canvas>
                </div>
            </article>

            <article class="content-card">
                <div class="card-heading">
                    <h2>Trading Volume</h2>
                    <p>Zoomable line chart of activity across major stocks</p>
                </div>
                <div class="chart-wrap">
                    <canvas id="volumeChart"></canvas>
                </div>
            </article>
        </section>
    </main>

    <script src="shared.js"></script>
    <script src="analytics.js"></script>
</body>
</html>
